<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Unicode Cycler</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    color: white;
    font-size: 12rem;
    font-family: "Segoe UI Symbol", "Noto Sans Symbols", sans-serif;
    overflow: hidden;
}
</style>
</head>
<body>

<div id="char">A</div>

<script>
const charEl = document.getElementById("char");
let codePoint = 0;

function nextChar() {
    try {
        charEl.textContent = String.fromCodePoint(codePoint);
    } catch {}

    codePoint++;

    // Unicode range: U+0000 to U+10FFFF
    if (codePoint > 0x10FFFF) {
        codePoint = 0;
    }
}

setInterval(nextChar, 100); // change every 0.1 second
</script>

</body>
</html>
